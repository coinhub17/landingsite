<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IPLOCAL - IP Verification</title>
  <link rel="stylesheet" href="style.css">

  <!-- jsPDF CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">
  <h1>📜 IP Proof & Timestamp Generator</h1>

  <input type="file" id="fileInput">
  <button onclick="processFile()">Generate Proof</button>

  <div id="output"></div>

  <h3>🔍 Verify File</h3>
  <input type="file" id="verifyFile">
  <input type="text" id="verifyHash" placeholder="Enter SHA256 hash">
  <button onclick="verifyFileHash()">Verify</button>

  <div id="verifyResult"></div>
</div>

<script>
const { jsPDF } = window.jspdf;
let lastGeneratedData = null;

// SHA256
async function sha256(buffer) {
  const hashBuffer = await crypto.subtle.digest("SHA-256", buffer);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

// Process file
async function processFile() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Upload a file");

  const buffer = await file.arrayBuffer();
  const hash = await sha256(buffer);
  const timestamp = new Date().toISOString();

  lastGeneratedData = { name: file.name, hash, timestamp };

  document.getElementById("output").innerHTML = `
    <p><strong>Filename:</strong> ${file.name}</p>
    <p><strong>SHA256:</strong> ${hash}</p>
    <p><strong>Timestamp:</strong> ${timestamp}</p>
    <button onclick="downloadPDF()">📥 Download PDF</button>
  `;
}

// 📄 Generate REAL PDF
function downloadPDF() {
  if (!lastGeneratedData) return;

  const doc = new jsPDF();

  // Title
  doc.setFont("helvetica", "bold");
  doc.setFontSize(18);
  doc.setTextColor(0, 51, 102);
  doc.text("IP Timestamp Proof Certificate", 105, 20, null, null, "center");

  // Line
  doc.setDrawColor(0, 51, 102);
  doc.line(20, 25, 190, 25);

  // Content
  doc.setFontSize(12);
  doc.setTextColor(0, 0, 0);

  doc.text("Filename:", 20, 40);
  doc.text(lastGeneratedData.name, 20, 47);

  doc.text("SHA256 Hash:", 20, 60);
  doc.setFontSize(10);
  doc.text(doc.splitTextToSize(lastGeneratedData.hash, 170), 20, 67);

  doc.setFontSize(12);
  doc.text("Timestamp:", 20, 100);
  doc.text(lastGeneratedData.timestamp, 20, 107);

  // Certification box
  doc.setFillColor(230, 240, 255);
  doc.rect(20, 120, 170, 30, "F");
  doc.setTextColor(50, 50, 50);
  doc.text(
    "This document certifies that the file was hashed at the stated time.",
    25,
    135,
    { maxWidth: 160 }
  );

  // Footer
  doc.setFont("helvetica", "bold");
  doc.setTextColor(0, 102, 153);
  doc.text("Generated by IPLOCAL", 190, 280, null, null, "right");

  doc.save(`proof_${lastGeneratedData.name}.pdf`);
}

// Verify
async function verifyFileHash() {
  const file = document.getElementById("verifyFile").files[0];
  const inputHash = document.getElementById("verifyHash").value.trim();

  if (!file || !inputHash) return alert("Provide both file and hash");

  const buffer = await file.arrayBuffer();
  const hash = await sha256(buffer);

  document.getElementById("verifyResult").innerHTML =
    hash === inputHash
      ? "<span class='success'>✅ Match</span>"
      : "<span class='error'>❌ Mismatch</span>";
}

// 🔐 Admin shortcut
document.addEventListener("keydown", function(e) {
  if (e.ctrlKey && e.altKey && e.key.toLowerCase() === "t") {
    if (!lastGeneratedData) return alert("No data");

    const blob = new Blob(
      [JSON.stringify(lastGeneratedData, null, 2)],
      { type: "application/json" }
    );

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "admin_data.json";
    link.click();
  }
});
</script>

</body>
</html>
</body>
</html>
